name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Lint
        run: npm run backend:lint

      - name: Django checks
        run: npm run backend:check

      - name: Migration check
        run: npm run backend:migrations:check

      - name: Tests with coverage
        run: npm run backend:coverage

  backend-postgres-concurrency:
    name: Backend PostgreSQL concurrency
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/saas_template_test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_template_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Test atomic usage reservation on PostgreSQL
        run: npm run backend:test:postgres-concurrency

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --prefix frontend

      - name: Lint
        run: npm run frontend:lint

      - name: Typecheck
        run: npm run frontend:typecheck

      - name: Tests with coverage
        run: npm run frontend:coverage

      - name: Security audit
        run: npm run security:frontend:audit

      - name: Install Playwright browsers
        run: npm --prefix frontend exec playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm --prefix frontend run e2e

      - name: Build
        run: npm run frontend:build
